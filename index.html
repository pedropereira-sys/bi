<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ClikSofthouse · BI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d0f;color:#f0f0f5;font-family:system-ui,-apple-system,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#27272f;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
input[type=date]{color-scheme:dark;background:#18181c;border:1px solid #27272f;border-radius:6px;color:#f0f0f5;padding:4px 8px;font-size:12px;outline:none}
button{cursor:pointer;transition:all .15s;font-family:inherit}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;flex-shrink:0;background:#111114;border-right:1px solid #27272f;display:flex;flex-direction:column;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.lw{padding:18px 16px 14px;border-bottom:1px solid #27272f}
.lw img{width:100%;max-height:36px;object-fit:contain;object-position:left}
nav{padding:10px 8px;flex:1}
.nlbl{color:#52525f;font-size:10px;letter-spacing:2px;padding:6px 8px 4px;text-transform:uppercase}
.nbtn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;background:transparent;border:none;border-radius:8px;color:#a0a0b0;font-size:13px;text-align:left;margin-bottom:2px}
.nbtn:hover{background:#ffffff0a;color:#f0f0f5}
.nact{background:#3B82F618 !important;color:#3B82F6 !important;font-weight:600}
.sbot{padding:12px 8px;border-top:1px solid #27272f;margin-top:auto}
#rbtn{width:100%;padding:8px;border-radius:8px;background:#3B82F6;border:none;color:#fff;font-size:12px;font-weight:600}
#rbtn:disabled{background:transparent;border:1px solid #27272f;color:#52525f}
#rbtn:hover:not(:disabled){background:#2563eb}
#topbar{border-bottom:1px solid #27272f;padding:14px 26px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
#topbar h1{font-size:19px;font-weight:800;line-height:1}
.tbtn{padding:6px 14px;border-radius:8px;background:transparent;border:1px solid #27272f;color:#a0a0b0;font-size:13px;font-weight:600}
.tbtn:hover{border-color:#52525f;color:#f0f0f5}
.tact{background:#3B82F6 !important;border-color:#3B82F6 !important;color:#fff !important}
#datebar{padding:9px 26px;border-bottom:1px solid #27272f;display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.rbtn2{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:transparent;border:1px solid #27272f;color:#a0a0b0}
.rbtn2:hover{border-color:#52525f;color:#f0f0f5}
.ract{background:#3B82F622 !important;border-color:#3B82F666 !important;color:#3B82F6 !important}
#custominp{display:none;gap:6px;align-items:center;margin-left:4px}
#custominp span{color:#52525f;font-size:12px}
#content{flex:1;overflow-y:auto;padding:20px 26px;animation:fi .25s ease both}
.krow{display:flex;gap:12px;margin-bottom:16px}
.kcard{flex:1;min-width:0;background:#18181c;border:1px solid #27272f;border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.klbl{color:#a0a0b0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.kval{font-size:28px;font-weight:800;line-height:1;margin-bottom:8px}
.ksub{color:#a0a0b0;font-size:12px}
.cgrid{display:grid;grid-template-columns:210px 1fr 250px;gap:14px;margin-bottom:16px}
.panel{background:#18181c;border:1px solid #27272f;border-radius:14px;padding:16px}
.ptitle{color:#a0a0b0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.vpanel{background:#18181c;border:1px solid #27272f;border-radius:14px;padding:18px 20px}
.dtable{background:#18181c;border:1px solid #27272f;border-radius:14px;overflow:hidden}
#errdiv{display:none;margin:8px 26px 0;background:#1a0000;border:1px solid #440000;border-radius:10px;padding:10px 16px;color:#ff6b6b;font-size:12px}
</style>
</head>

function s0(d){var x=new Date(d);x.setHours(0,0,0,0);return x;}
function e0(d){var x=new Date(d);x.setHours(23,59,59,999);return x;}
function ago(n){var d=new Date();d.setDate(d.getDate()-n);return s0(d);}

function getPrevRange(){
  // Returns the period BEFORE the current range for comparison
  var d=new Date();
  if(range==="today"){
    var y=ago(1);return{a:y,b:e0(y)};
  }
  if(range==="yesterday"){
    var y=ago(2);return{a:y,b:e0(y)};
  }
  if(range==="7d")  return{a:ago(13),b:e0(ago(7))};
  if(range==="15d") return{a:ago(29),b:e0(ago(15))};
  if(range==="30d") return{a:ago(59),b:e0(ago(30))};
  if(range==="currMonth"){
    // Previous month
    var pm=new Date(d.getFullYear(),d.getMonth()-1,1);
    return{a:s0(pm),b:new Date(pm.getFullYear(),pm.getMonth()+1,0,23,59,59,999)};
  }
  if(range==="prevMonth"){
    // 2 months ago
    var pm=new Date(d.getFullYear(),d.getMonth()-2,1);
    return{a:s0(pm),b:new Date(pm.getFullYear(),pm.getMonth()+1,0,23,59,59,999)};
  }
  if(range==="prevYear"){
    var y=d.getFullYear()-2;
    return{a:new Date(y,0,1),b:new Date(y,11,31,23,59,59,999)};
  }
  if(range==="all_time") return{a:null,b:null};
  return{a:null,b:null};
}

function getFilteredByRange(rng,tabFilter){

}

function delta(curr,prev){
  if(!prev) return null;
  var d=Math.round((curr-prev)/prev*100);
  return d;
}

function deltaHTML(curr,prev,isCurrency){
  var d=delta(curr,prev);
  if(d===null||prev===0) return '';
  var sign=d>=0?"+":"";
  var col=d>=0?"#22c55e":"#ef4444";
  var arrow=d>=0?"▲":"▼";
  return '<span style="font-size:11px;font-weight:700;color:'+col+';background:'+col+'18;border-radius:20px;padding:2px 8px;margin-left:6px">'+arrow+' '+sign+d+'%</span>';
}

function getRange(){

  if(range==="15d")     return{a:ago(14),b:e0(new Date())};
  if(range==="30d")     return{a:ago(29),b:e0(new Date())};
  if(range==="currMonth"){
    var d=new Date();d.setDate(1);
    return{a:s0(d),b:e0(new Date())};
  }
  if(range==="prevMonth"){
    var d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);
    return{a:s0(d),b:new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999)};

}

function parseCSV(text){
  var lines=text.split("\n");
  var hi=-1;
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.indexOf("ID da Venda")>=0||l.indexOf("Nome do Vendedor")>=0){hi=i;break;}
  }
  if(hi<0) hi=3;
  var out=[];
  var autoId=1;

  function parseDate(raw){
    if(!raw) return null;
    raw=raw.trim();
    var p=raw.split("/");
    if(p.length===3&&p[2].length===4){
      var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
      if(!isNaN(d.getTime())) return d;
    }
    var p2=raw.split("-");
    if(p2.length===3&&p2[0].length===4){
      var d=new Date(parseInt(p2[0]),parseInt(p2[1])-1,parseInt(p2[2]));
      if(!isNaN(d.getTime())) return d;
    }
    var serial=parseFloat(raw);
    if(!isNaN(serial)&&serial>40000&&serial<60000){
      var ms=Date.UTC(1899,11,30)+serial*86400000;
      return new Date(ms);
    }
    return null;
  }

  function splitLine(line){
    var c=[],cur="",inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){c.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    c.push(cur.trim());
    for(var j=0;j<c.length;j++) c[j]=c[j].replace(/^"|"$/g,"").trim();
    return c;
  }

  for(var i=hi+1;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line) continue;
    var c=splitLine(line);
    var vendedor=c[0]?c[0].trim():"";
    if(!vendedor) continue;
    if(vendedor.toLowerCase().indexOf("vendedor")>=0) continue;
    if(vendedor.indexOf("{")>=0||vendedor.indexOf("<")>=0) continue;
    var tipoRaw=c[7]?c[7].trim():"";
    var tipo=tipoRaw.replace(/[^a-zA-Z\u00C0-\u00FF\s]/g,"").trim();
    if(tipo.toLowerCase().indexOf("ativa")>=0) tipo="Ativação";
    else if(tipo.toLowerCase().indexOf("renova")>=0) tipo="Renovação";
    else if(tipo.toLowerCase().indexOf("adicion")>=0) tipo="Adicional";
    else tipo="";
    if(!tipo) continue;
    var idVal=c[1]?c[1].trim():"";
    var id=idVal||("VND-"+String(autoId++).padStart(3,"0"));
    var qty=parseFloat((c[5]||"").replace(",","."))||1;
    var val=parseFloat((c[6]||"").replace(",","."))||0;
    var rawTotal=(c[8]||"").replace(/R\$\s*/g,"").replace(/\./g,"").replace(",",".");
    var total=parseFloat(rawTotal);
    if(isNaN(total)) total=qty*val;
    var rawDate=c[2]?c[2].trim():"";
    var dp=parseDate(rawDate);
    var dtDisplay=rawDate;
    if(dp&&rawDate.indexOf("/")<0){
      dtDisplay=String(dp.getDate()).padStart(2,"0")+"/"+String(dp.getMonth()+1).padStart(2,"0")+"/"+dp.getFullYear();
    }
    out.push({v:vendedor,id:id,dt:dtDisplay,dp:dp,
      cl:c[3]?c[3].trim():"",
      pr:(c[4]?c[4].trim():"").replace(/[{}<>]/g,"").trim(),
      tipo:tipo,total:isNaN(total)?0:total});
  }
  var tipoCount={};
  for(var di=0;di<out.length;di++){var t=out[di].tipo;tipoCount[t]=(tipoCount[t]||0)+1;}
  console.log("=== ["+/*s.name via closure*/"sheet"+"] CSV parsed: "+out.length+" rows ===");
  console.log("Tipos:", JSON.stringify(tipoCount));
  console.log("Todas linhas:", out.map(function(r,i){return i+":"+r.v+"/"+r.tipo+"/"+r.dt;}).join(" | "));
  console.log("Total linhas no CSV:", lines.length, "| header em:", hi);
  return out;
}

function fetchSheet(s,cb){
  // Use allorigins /get endpoint which returns JSON with full content - no truncation
  var alloriginsJson="https://api.allorigins.win/get?url="+encodeURIComponent(s.url)+"&timestamp="+Date.now();
  var alloriginsRaw="https://api.allorigins.win/raw?url="+encodeURIComponent(s.url)+"&timestamp="+Date.now();
  var corssh="https://proxy.cors.sh/"+s.url;
  var codetabs="https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(s.url);

  function isValidCSV(text){
    return text&&text.length>200&&text.indexOf("<!doctype")<0&&text.indexOf("<html")<0&&text.indexOf("Vendedor")>=0;
  }

  // Try allorigins JSON first (returns {contents: "..."} - never truncates)
  fetch(alloriginsJson)
    .then(function(r){return r.json();})
    .then(function(data){
      var text=data&&data.contents?data.contents:"";
      if(isValidCSV(text)){
        console.log("["+s.name+"] allorigins JSON OK | "+text.length+"b | "+text.split("\n").length+" linhas");
        cb(null,parseCSV(text));
        return;
      }
      throw new Error("allorigins JSON inválido: "+text.length+"b");
    })
    .catch(function(e){
      console.warn("["+s.name+"] allorigins JSON falhou:",e.message,", tentando raw...");
      // Fallback to raw
      fetch(alloriginsRaw)
        .then(function(r){return r.text();})
        .then(function(text){
          if(isValidCSV(text)){
            console.log("["+s.name+"] allorigins RAW OK | "+text.length+"b | "+text.split("\n").length+" linhas");
            cb(null,parseCSV(text));
            return;
          }
          throw new Error("raw inválido");
        })
        .catch(function(e2){
          console.warn("["+s.name+"] allorigins raw falhou, tentando codetabs...");
          fetch(codetabs)
            .then(function(r){return r.text();})
            .then(function(text){
              if(isValidCSV(text)){
                console.log("["+s.name+"] codetabs OK | "+text.length+"b");
                cb(null,parseCSV(text));
              } else {
                cb("Todos os proxies falharam ou retornaram dados inválidos",null);
              }
            })
            .catch(function(){cb("Falha de conexão",null);});
        });
    });
}

function BRL(n){return "R$ "+n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function BRLk(n){return n>=1000?"R$ "+(n/1000).toFixed(1)+"k":BRL(n);}
function pct(a,b){return b?Math.round(a/b*100)+"%":"—";}

function h(tag,attrs,content){
  var s="<"+tag;
  for(var k in attrs) s+=" "+k+'="'+attrs[k]+'"';
  s+=">";
  if(content!==undefined) s+=content;
  s+="</"+tag+">";
  return s;
}

function donutSVG(pie,total){
  if(!pie.length||!total) return '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="38" fill="none" stroke="#27272f" stroke-width="14"/></svg>';
  var r=38,circ=2*Math.PI*r,offset=0,paths="";
  for(var i=0;i<pie.length;i++){
    var len=(pie[i].v/total)*circ;
    var gap=2;
    paths+='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+pie[i].c+'" stroke-width="14"'+
      ' stroke-dasharray="'+Math.max(0,len-gap)+' '+(circ-(len-gap))+'"'+
      ' stroke-dashoffset="'+(-offset)+'" transform="rotate(-90 50 50)"/>';
    offset+=len;
  }
  return '<svg viewBox="0 0 100 100">'+paths+'</svg>';
}

function barChart(data){
  if(!data.length) return '<div style="height:180px;display:flex;align-items:center;justify-content:center;color:#52525f;font-size:13px">Sem dados no período</div>';
  var total=0; for(var i=0;i<data.length;i++) total+=data[i].v;
  var max=0; for(var i=0;i<data.length;i++) if(data[i].v>max) max=data[i].v;
  if(!max) max=1;
  var H=130;
  var html='<div style="display:flex;align-items:flex-end;gap:24px;height:'+(H+70)+'px;position:relative;padding-top:40px">';
  html+='<div style="position:absolute;left:0;right:0;top:0;bottom:90px;background:repeating-linear-gradient(to bottom,#27272f 0,#27272f 1px,transparent 1px,transparent 25%);pointer-events:none"></div>';
  for(var i=0;i<data.length;i++){
    var bh=Math.max(6,Math.round((data[i].v/max)*H));
    var pctV=total?Math.round(data[i].v/total*100):0;
    html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative;z-index:1">';
    // Bar
    html+='<div style="width:70%;max-width:90px;height:'+bh+'px;background:linear-gradient(180deg,'+data[i].c+'ee,'+data[i].c+'66);border-radius:8px 8px 0 0;box-shadow:0 0 16px '+data[i].c+'33"></div>';
    // Label + value below
    html+='<div style="width:100%;padding-top:8px;text-align:center;border-top:2px solid '+data[i].c+'44">';
    html+='<div style="font-size:12px;font-weight:600;color:#a0a0b0;margin-bottom:4px">'+data[i].n+'</div>';
    html+='<div style="font-size:12px;font-weight:700;color:'+data[i].c+'">'+BRL(data[i].v)+'</div>';
    html+='<span style="background:'+data[i].c+'22;border:1px solid '+data[i].c+'44;border-radius:20px;padding:1px 8px;font-size:10px;font-weight:700;color:'+data[i].c+'">'+pctV+'%</span>';
    html+='</div></div>';
  }
  return html+'</div>';
}

function dailyChart(rows){
  if(!rows.length) return '<div style="height:180px;display:flex;align-items:center;justify-content:center;color:#52525f;font-size:13px">Sem dados no período</div>';
  // Build day map
  var dayMap={};
  var dayOrder=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r.dt) continue;
    var day=r.dt;
    if(!dayMap[day]){dayMap[day]={total:0,cnt:0,atv:0,ren:0,adi:0};dayOrder.push(day);}
    dayMap[day].total+=r.total;
    dayMap[day].cnt++;
    if(r.tipo==="Ativação") dayMap[day].atv++;
    else if(r.tipo==="Renovação") dayMap[day].ren++;
    else dayMap[day].adi++;
  }
  // Sort by date
  dayOrder.sort(function(a,b){
    var pa=a.split("/"),pb=b.split("/");
    if(pa.length===3&&pb.length===3){
      return new Date(parseInt(pa[2]),parseInt(pa[1])-1,parseInt(pa[0]))-new Date(parseInt(pb[2]),parseInt(pb[1])-1,parseInt(pb[0]));
    }
    return a.localeCompare(b);
  });
  var maxV=0; for(var i=0;i<dayOrder.length;i++) if(dayMap[dayOrder[i]].total>maxV) maxV=dayMap[dayOrder[i]].total;
  if(!maxV) maxV=1;
  var H=120;
  var barW=dayOrder.length>14?16:dayOrder.length>7?26:42;
  var gap=dayOrder.length>14?6:10;
  var html='<div style="overflow-x:auto;overflow-y:visible;padding-bottom:4px">';
  html+='<div style="display:flex;align-items:flex-end;gap:'+gap+'px;height:'+(H+72)+'px;padding:8px 4px 0;min-width:'+(dayOrder.length*(barW+gap))+'px;position:relative">';
  html+='<div style="position:absolute;left:0;right:0;top:8px;bottom:72px;background:repeating-linear-gradient(to bottom,#27272f 0,#27272f 1px,transparent 1px,transparent 25%);pointer-events:none"></div>';
  for(var i=0;i<dayOrder.length;i++){
    var day=dayOrder[i];
    var d=dayMap[day];
    var bh=Math.max(4,Math.round((d.total/maxV)*H));
    var shortDay=day.substring(0,5); // DD/MM
    var barColor=d.atv>d.ren?"#3B82F6":"#22c55e";
    if(d.adi>d.atv&&d.adi>d.ren) barColor="#f59e0b";
    html+='<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:'+barW+'px;height:100%;justify-content:flex-end;position:relative;z-index:1">';
    html+='<div style="font-size:10px;font-weight:600;color:'+barColor+';margin-bottom:3px;white-space:nowrap">'+BRL(d.total)+'</div>';
    html+='<div title="'+day+': R$ '+d.total.toFixed(2)+' ('+d.cnt+' vendas)" style="width:100%;height:'+bh+'px;background:linear-gradient(180deg,'+barColor+'ee,'+barColor+'66);border-radius:6px 6px 0 0;box-shadow:0 0 12px '+barColor+'33;cursor:pointer"></div>';
    html+='<div style="width:100%;padding-top:6px;border-top:2px solid '+barColor+'44;text-align:center">';
    html+='<div style="font-size:10px;color:#52525f;white-space:nowrap">'+shortDay+'</div>';
    html+='<div style="font-size:10px;font-weight:700;color:#a0a0b0">'+d.cnt+'</div>';
    html+='</div></div>';
  }
  return html+'</div></div>';
}

function renderOverview(rows){
  var rev=0; for(var i=0;i<rows.length;i++) rev+=rows[i].total;
  var cnt=rows.length;
  var avg=cnt?rev/cnt:0;
  var atv=[],ren=[],adi=[];
  for(var i=0;i<rows.length;i++){
    if(rows[i].tipo==="Ativação") atv.push(rows[i]);
    else if(rows[i].tipo==="Renovação") ren.push(rows[i]);
    else if(rows[i].tipo==="Adicional") adi.push(rows[i]);
  }
  var atvR=0,renR=0,adiR=0;
  for(var i=0;i<atv.length;i++) atvR+=atv[i].total;
  for(var i=0;i<ren.length;i++) renR+=ren[i].total;
  for(var i=0;i<adi.length;i++) adiR+=adi[i].total;

  // Products
  var pm={};
  for(var i=0;i<rows.length;i++){

        if(rng.b&&r.dp>rng.b) return false;
        return true;
      });
    }
    var sv=0; for(var i=0;i<sr.length;i++) sv+=sr[i].total;
    // Prev period for this vendor
    var prevRngV=getPrevRange();
    var srPrev=allData[s.name]||[];

    });}
    var svPrev=0; for(var i=0;i<srPrev.length;i++) svPrev+=srPrev[i].total;

      vendorCards+='</div>';

  // Previous period comparison
  var prevRng=getPrevRange();

  var prevRev=0; for(var i=0;i<prevRows.length;i++) prevRev+=prevRows[i].total;

    {lbl:"Adicionais",ico:"➕",val:adi.length,sub:BRL(adiR),c:"#f59e0b",pct:pct(adi.length,cnt),cmpV:adi.length,prevV:prevAdi.length,cmpSub:"Anterior: "+prevAdi.length+" · "+BRL(prevAdiR)},
  ];
  var kpiHTML='<div class="krow">';
  for(var i=0;i<kpis.length;i++){
    var k=kpis[i];
    kpiHTML+='<div class="kcard"><div class="klbl">'+k.ico+' '+k.lbl;
    if(k.pct) kpiHTML+=' <span style="color:'+k.c+';background:'+k.c+'18;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:4px">'+k.pct+'</span>';

  kpiHTML+='</div>';

  var prodHTML='';

      prodHTML+='<div style="padding:8px 0;border-bottom:1px solid #27272f">';
      prodHTML+='<div style="display:flex;justify-content:space-between;margin-bottom:5px">';

      prodHTML+='<span style="color:'+PC[i%5]+';font-weight:700;font-size:13px">'+prods[i][1]+'</span>';
      prodHTML+='</div>';
      prodHTML+='<div style="height:4px;background:#27272f;border-radius:4px"><div style="height:100%;width:'+pw+'%;background:'+PC[i%5]+';border-radius:4px"></div></div>';
      prodHTML+='</div>';
    }
  }

  var pieSVG=donutSVG(pie,cnt);
  var legHTML='';
  var legData=[{l:"Ativação",v:atv.length,c:"#3B82F6"},{l:"Renovação",v:ren.length,c:"#22c55e"},{l:"Adicional",v:adi.length,c:"#f59e0b"}];
  for(var i=0;i<legData.length;i++){
    legHTML+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">';
    legHTML+='<div style="display:flex;align-items:center;gap:6px">';
    legHTML+='<div style="width:8px;height:8px;border-radius:2px;background:'+legData[i].c+'"></div>';
    legHTML+='<span style="color:#a0a0b0;font-size:12px">'+legData[i].l+'</span></div>';
    legHTML+='<span style="color:'+legData[i].c+';font-weight:700;font-size:13px">'+legData[i].v+'</span>';
    legHTML+='</div>';
  }

  return kpiHTML+
    rankingHTML(rows)+
    '<div class="cgrid">'+
      '<div class="panel"><div class="ptitle">Situação</div>'+
        '<div style="position:relative;width:140px;height:140px;margin:0 auto 12px">'+
          pieSVG+
          '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">'+
            '<div style="font-size:22px;font-weight:800">'+cnt+'</div>'+
            '<div style="font-size:10px;color:#52525f">vendas</div>'+
          '</div></div>'+legHTML+'</div>'+
      '<div class="panel"><div class="ptitle" style="display:flex;justify-content:space-between">Valor por Tipo <span style="font-size:11px">R$</span></div>'+barChart(barData)+'</div>'+
      '<div class="panel"><div class="ptitle" style="display:flex;justify-content:space-between">Top Produtos <span style="font-size:11px">Qtd</span></div>'+prodHTML+'</div>'+
    '</div>'+
    '<div class="panel" style="margin-bottom:16px"><div class="ptitle" style="display:flex;justify-content:space-between">Vendas por Dia <span style="font-size:11px">R$ · qtd</span></div>'+dailyChart(rows)+'</div>'+
    '<div class="vgrid" style="margin-bottom:16px">'+vendorCards+'</div>';
}

function renderProdutos(rows){
  var pm={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i]; if(!r.pr) continue;
    if(!pm[r.pr]) pm[r.pr]={t:0,n:0,tp:{}};
    pm[r.pr].t+=r.total; pm[r.pr].n++;
    pm[r.pr].tp[r.tipo]=(pm[r.pr].tp[r.tipo]||0)+1;
  }
  var sorted=[];
  for(var k in pm) sorted.push([k,pm[k]]);
  sorted.sort(function(a,b){return b[1].t-a[1].t;});
  var maxT=sorted.length?sorted[0][1].t:1;
  var inner='';
  for(var i=0;i<sorted.length;i++){
    var nm=sorted[i][0],d=sorted[i][1];
    var label=nm.indexOf(" - ")>=0?nm.split(" - ")[1]:nm;
    var cat=nm.indexOf(" - ")>=0?nm.split(" - ")[0]:"";
    var w=Math.round(d.t/maxT*100);
    var tipoH='';
    for(var t in d.tp){
      var tc=TC[t]||"#3B82F6";
      tipoH+='<span style="background:'+tc+'18;color:'+tc+';padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px">'+t+': '+d.tp[t]+'</span>';
    }
    inner+='<div style="padding:14px 20px;'+(i>0?'border-top:1px solid #27272f':'')+'">';
    inner+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    inner+='<div><div style="font-size:13px;font-weight:600">'+label+'</div><div style="color:#52525f;font-size:11px;margin-top:2px">'+cat+' · '+d.n+' vendas</div></div>';
    inner+='<div style="text-align:right"><div style="color:#3B82F6;font-weight:700;font-size:15px">'+BRL(d.t)+'</div><div style="color:#52525f;font-size:11px">Ticket: '+BRL(d.t/d.n)+'</div></div>';
    inner+='</div>';
    inner+='<div style="height:4px;background:#27272f;border-radius:4px;margin-bottom:8px"><div style="height:100%;width:'+w+'%;background:linear-gradient(90deg,#3B82F6,#8B5CF6);border-radius:4px"></div></div>';
    inner+=tipoH+'</div>';
  }
  if(!inner) inner='<div style="padding:40px;text-align:center;color:#52525f">Sem dados no período</div>';
  return '<div class="dtable"><div style="padding:14px 20px;border-bottom:1px solid #27272f;display:flex;justify-content:space-between"><span style="font-weight:700;font-size:15px">Análise de Produtos</span><span style="color:#52525f;font-size:12px">'+sorted.length+' produtos</span></div>'+inner+'</div>';
}

function rankingHTML(rows){
  // Build vendor stats
  var vm={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r.v) continue;
    if(!vm[r.v]) vm[r.v]={name:r.v,total:0,cnt:0,atv:0,ren:0,adi:0};
    vm[r.v].total+=r.total;
    vm[r.v].cnt++;
    if(r.tipo==="Ativação") vm[r.v].atv++;
    else if(r.tipo==="Renovação") vm[r.v].ren++;
    else if(r.tipo==="Adicional") vm[r.v].adi++;
  }
  var vendors=[];
  for(var k in vm) vendors.push(vm[k]);

  // Sort by volume
  var byVol=vendors.slice().sort(function(a,b){return b.total-a.total;});
  // Sort by quantity
  var byQty=vendors.slice().sort(function(a,b){return b.cnt-a.cnt;});

  var maxVol=byVol.length?byVol[0].total:1;
  var maxQty=byQty.length?byQty[0].cnt:1;

  var posColors=["#f59e0b","#94a3b8","#cd7f32"];
  var posBg=["#f59e0b22","#94a3b822","#cd7f3222"];

  function vendorColor(name){
    for(var i=0;i<SHEETS.length;i++) if(SHEETS[i].name===name) return SHEETS[i].color;
    return "#3B82F6";
  }
  function vendorIni(name){
    for(var i=0;i<SHEETS.length;i++) if(SHEETS[i].name===name) return SHEETS[i].ini;
    return name.substring(0,2).toUpperCase();
  }

  function rankRow(item, idx, value, valueLabel, maxVal){
    var c=vendorColor(item.name);
    var ini=vendorIni(item.name);
    var pos=idx+1;
    var posC=posColors[idx]||"#52525f";
    var posBgC=posBg[idx]||"#52525f18";
    var barW=Math.round((value/maxVal)*100);
    return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #27272f">'+
      '<div style="width:36px;height:36px;border-radius:10px;background:'+posBgC+';border:2px solid '+posC+';display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:'+posC+';flex-shrink:0">'+pos+'°</div>'+
      '<div style="width:32px;height:32px;border-radius:8px;background:'+c+'28;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+c+';flex-shrink:0">'+ini+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'+
          '<span style="font-weight:700;font-size:14px">'+item.name+'</span>'+
          '<span style="font-weight:800;font-size:15px;color:'+c+'">'+valueLabel+'</span>'+
        '</div>'+
        '<div style="height:6px;background:#27272f;border-radius:6px;overflow:hidden;margin-bottom:4px">'+
          '<div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,'+c+','+c+'66);border-radius:6px"></div>'+
        '</div>'+
        '<div style="display:flex;gap:10px">'+
          '<span style="color:#3B82F6;font-size:10px;font-weight:600">Ativ: '+item.atv+'</span>'+
          '<span style="color:#22c55e;font-size:10px;font-weight:600">Renov: '+item.ren+'</span>'+
          '<span style="color:#f59e0b;font-size:10px;font-weight:600">Adic: '+item.adi+'</span>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  var volRows='';
  for(var i=0;i<byVol.length;i++) volRows+=rankRow(byVol[i],i,byVol[i].total,BRL(byVol[i].total),maxVol);

  var qtyRows='';
  for(var i=0;i<byQty.length;i++) qtyRows+=rankRow(byQty[i],i,byQty[i].cnt,byQty[i].cnt+' vendas',maxQty);

  if(!vendors.length) return '';

  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">'+
    '<div class="panel">'+
      '<div class="ptitle" style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'+
        '<span style="font-size:16px">💰</span> Ranking por Volume <span style="color:#52525f;font-size:10px;margin-left:auto">R$</span>'+
      '</div>'+
      volRows+
    '</div>'+
    '<div class="panel">'+
      '<div class="ptitle" style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'+
        '<span style="font-size:16px">🏆</span> Ranking por Quantidade <span style="color:#52525f;font-size:10px;margin-left:auto">vendas</span>'+
      '</div>'+
      qtyRows+
    '</div>'+
  '</div>';
}

function render(){
  var rows=getFiltered();
  var cnt=rows.length;
  var titles={overview:"Visão Geral de Vendas",vendas:"Histórico de Vendas",produtos:"Análise de Produtos"};
  document.getElementById("ptitle").textContent=titles[page];
  document.getElementById("psub").textContent=rangeLabel()+" · "+cnt+" registros";
  var c=document.getElementById("content");
  if(page==="overview") c.innerHTML=renderOverview(rows);
  else if(page==="vendas") c.innerHTML=renderVendas(rows);
  else c.innerHTML=renderProdutos(rows);
}

function updateSideVendors(){
  var el=document.getElementById("vsidebar");
  var html="";
  for(var i=0;i<SHEETS.length;i++){
    var s=SHEETS[i];
    var sr=allData[s.name]||[];
    var sv=0; for(var j=0;j<sr.length;j++) sv+=sr[j].total;
    var active=tab===s.name;
    html+='<div onclick="setTab(\''+s.name+'\')" style="padding:10px;border-radius:10px;margin-bottom:4px;cursor:pointer;border:1px solid '+(active?s.color+'33':'transparent')+';background:'+(active?s.color+'14':'transparent')+'" onmouseover="this.style.background=\''+(active?s.color+'14':'#ffffff05')+'\'" onmouseout="this.style.background=\''+(active?s.color+'14':'transparent')+'\'">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
    html+='<div style="width:24px;height:24px;border-radius:6px;background:'+s.color+'28;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+s.color+'">'+s.ini+'</div>';
    html+='<span style="color:#a0a0b0;font-size:12px;font-weight:500">'+s.name+'</span></div>';
    html+='<div style="display:flex;justify-content:space-between;padding-left:32px">';
    html+='<span style="color:#52525f;font-size:11px">'+sr.length+' vendas</span>';
    html+='<span style="color:'+s.color+';font-size:11px;font-weight:700">'+BRL(sv)+'</span>';
    html+='</div></div>';
  }
  el.innerHTML=html;
}

function setPage(p){
  page=p;
  document.querySelectorAll(".nbtn").forEach(function(b){
    b.classList.remove("nact");
    if(b.dataset.page===p) b.classList.add("nact");
  });
  render();
}

function setTab(t){
  tab=t;
  document.querySelectorAll(".tbtn").forEach(function(b){
    b.classList.remove("tact");
    if(b.dataset.tab===t) b.classList.add("tact");
  });
  updateSideVendors();
  render();
}

function setRange(r){
  range=r;
  document.querySelectorAll(".rbtn2").forEach(function(b){
    b.classList.remove("ract");
    if(b.dataset.range===r) b.classList.add("ract");
  });
  document.getElementById("custominp").style.display=r==="custom"?"flex":"none";
  render();
}

window.onload=function(){
  render();
  loadData();
  // Auto-refresh every 10 minutes
  setInterval(function(){
    console.log("Auto-refresh...");
    loadData();
  }, 10 * 60 * 1000);
};

</script>
</body>
</html>
